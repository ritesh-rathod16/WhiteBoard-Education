<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhiteBoard Pro</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4285F4;
            --secondary: #34A853;
            --accent: #EA4335;
            --light: #F5F5F5;
            --dark: #202124;
            --text: #333;
            --white: #fff;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            background: var(--light);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }
        
        /* Splash Screen */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }
        
        .splash-logo {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        /* Auth Container */
        .auth-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 900;
            justify-content: center;
            align-items: center;
        }
        
        .auth-box {
            background: var(--white);
            width: 400px;
            max-width: 90%;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .auth-tabs {
            display: flex;
            border-bottom: 1px solid #eee;
        }
        
        .auth-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .auth-tab.active {
            border-bottom: 2px solid var(--primary);
            color: var(--primary);
            font-weight: 600;
        }
        
        .auth-content {
            padding: 25px;
        }
        
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .form-group label {
            font-size: 14px;
            color: var(--dark);
        }
        
        .form-group input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }
        
        .auth-btn {
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .social-auth {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
        }
        
        .social-btn {
            flex: 1;
            min-width: 120px;
            padding: 10px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            border: 1px solid #ddd;
            background: white;
        }
        
        .google-btn { color: #DB4437; }
        .github-btn { color: #333; }
        .linkedin-btn { color: #0077B5; }
        .email-btn { color: var(--primary); }
        .phone-btn { color: var(--secondary); }
        
        /* Dashboard */
        .dashboard {
            display: none;
            height: 100vh;
            flex-direction: column;
        }
        
        .dashboard-header {
            background: var(--dark);
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .profile-pic {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        
        .dashboard-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        .sidebar {
            width: 280px;
            background: white;
            border-right: 1px solid #eee;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .new-board-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .board-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .board-item {
            padding: 12px;
            margin-bottom: 8px;
            background: #f9f9f9;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .board-item:hover {
            background: #eee;
        }
        
        .board-item.active {
            background: var(--primary);
            color: white;
        }
        
        .board-name {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .board-date {
            font-size: 12px;
            color: #666;
        }
        
        .board-item.active .board-date {
            color: rgba(255,255,255,0.8);
        }
        
        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .welcome-message {
            text-align: center;
            max-width: 600px;
        }
        
        .welcome-title {
            font-size: 2rem;
            margin-bottom: 20px;
            color: var(--dark);
        }
        
        .welcome-text {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 30px;
        }
        
        .action-btns {
            display: flex;
            gap: 15px;
        }
        
        .action-btn {
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .primary-btn {
            background: var(--primary);
            color: white;
            border: none;
        }
        
        .secondary-btn {
            background: white;
            border: 2px solid var(--primary);
            color: var(--primary);
        }
        
        /* Whiteboard App */
        .whiteboard-app {
            display: none;
            height: 100vh;
            flex-direction: column;
        }
        
        .whiteboard-header {
            background: var(--dark);
            color: white;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .board-title {
            font-weight: 600;
        }
        
        .whiteboard-toolbar {
            display: flex;
            gap: 10px;
        }
        
        .tool-btn {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .whiteboard-container {
            flex: 1;
            position: relative;
            background: white;
            background-image: 
                linear-gradient(#e0e0e0 1px, transparent 1px),
                linear-gradient(90deg, #e0e0e0 1px, transparent 1px);
            background-size: 20px 20px;
            overflow: hidden;
        }
        
        #whiteboard {
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }
        
        /* Loading */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 1000;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 220px;
            }
            
            .social-btn {
                min-width: calc(50% - 10px);
            }
        }
    </style>
</head>
<body>
    <!-- Splash Screen -->
    <div class="splash-screen" id="splashScreen">
        <img src="https://sigmawire.net/i/04/qh5l0U.png" alt="WhiteBoard Pro" class="splash-logo">
    </div>
    
    <!-- Auth Container -->
    <div class="auth-container" id="authContainer">
        <div class="auth-box">
            <div class="auth-tabs">
                <div class="auth-tab active" id="loginTab">Login</div>
                <div class="auth-tab" id="registerTab">Register</div>
            </div>
            <div class="auth-content">
                <form class="auth-form" id="loginForm">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="auth-btn">Login</button>
                </form>
                
                <div class="social-auth">
                    <button class="social-btn google-btn" id="googleAuth">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button class="social-btn github-btn" id="githubAuth">
                        <i class="fab fa-github"></i> GitHub
                    </button>
                    <button class="social-btn linkedin-btn" id="linkedinAuth">
                        <i class="fab fa-linkedin-in"></i> LinkedIn
                    </button>
                    <button class="social-btn email-btn" id="emailAuth">
                        <i class="fas fa-envelope"></i> Email
                    </button>
                    <button class="social-btn phone-btn" id="phoneAuth">
                        <i class="fas fa-phone"></i> Phone
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <div class="dashboard-header">
            <h2>WhiteBoard Pro</h2>
            <div class="user-profile">
                <div class="profile-pic" id="profilePic">U</div>
                <span id="usernameDisplay">User</span>
            </div>
        </div>
        <div class="dashboard-content">
            <div class="sidebar">
                <div class="sidebar-header">
                    <button class="new-board-btn" id="newBoardBtn">
                        <i class="fas fa-plus"></i> New Board
                    </button>
                </div>
                <div class="board-list" id="boardList">
                    <!-- Boards will be loaded here -->
                </div>
            </div>
            <div class="main-content" id="mainContent">
                <div class="welcome-message">
                    <h1 class="welcome-title">Welcome to WhiteBoard Pro</h1>
                    <p class="welcome-text">
                        Create, collaborate, and share your ideas in real-time with our interactive whiteboard.
                        Select an existing board or create a new one to get started.
                    </p>
                    <div class="action-btns">
                        <button class="action-btn primary-btn" id="quickStartBtn">
                            <i class="fas fa-plus"></i> Quick Start
                        </button>
                        <button class="action-btn secondary-btn" id="learnMoreBtn">
                            <i class="fas fa-info-circle"></i> Learn More
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Whiteboard App -->
    <div class="whiteboard-app" id="whiteboardApp">
        <div class="whiteboard-header">
            <div class="board-title" id="boardTitle">Untitled Board</div>
            <div class="whiteboard-toolbar">
                <button class="tool-btn" id="backToDashboard">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <button class="tool-btn" id="saveBoardBtn">
                    <i class="fas fa-save"></i>
                </button>
            </div>
        </div>
        <div class="whiteboard-container">
            <canvas id="whiteboard"></canvas>
        </div>
    </div>
    
    <!-- Loading Screen -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p id="loadingText">Loading...</p>
    </div>
    
    <script>
        // DOM Elements
        const splashScreen = document.getElementById('splashScreen');
        const authContainer = document.getElementById('authContainer');
        const dashboard = document.getElementById('dashboard');
        const whiteboardApp = document.getElementById('whiteboardApp');
        const loginForm = document.getElementById('loginForm');
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const profilePic = document.getElementById('profilePic');
        const usernameDisplay = document.getElementById('usernameDisplay');
        const newBoardBtn = document.getElementById('newBoardBtn');
        const quickStartBtn = document.getElementById('quickStartBtn');
        const boardList = document.getElementById('boardList');
        const backToDashboard = document.getElementById('backToDashboard');
        const saveBoardBtn = document.getElementById('saveBoardBtn');
        const boardTitle = document.getElementById('boardTitle');
        const loadingScreen = document.getElementById('loading');
        const loadingText = document.getElementById('loadingText');
        
        // Whiteboard Elements
        const whiteboard = document.getElementById('whiteboard');
        const ctx = whiteboard.getContext('2d');
        
        // App State
        let currentUser = null;
        let boards = [];
        let currentBoard = null;
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        
        // Initialize App
        function initApp() {
            // Hide splash screen after 1.5 seconds
            setTimeout(() => {
                splashScreen.style.opacity = '0';
                setTimeout(() => {
                    splashScreen.style.display = 'none';
                    checkAuth();
                }, 500);
            }, 1500);
            
            // Set up event listeners
            setupEventListeners();
        }
        
        function checkAuth() {
            // Check if user is logged in (in a real app, this would check localStorage or cookies)
            const user = localStorage.getItem('whiteboard_user');
            if (user) {
                currentUser = JSON.parse(user);
                loadDashboard();
            } else {
                showAuth();
            }
        }
        
        function showAuth() {
            authContainer.style.display = 'flex';
        }
        
        function hideAuth() {
            authContainer.style.display = 'none';
        }
        
        function loadDashboard() {
            // Update user info
            profilePic.textContent = currentUser.name.charAt(0).toUpperCase();
            usernameDisplay.textContent = currentUser.name;
            
            // Load boards (in a real app, this would fetch from a database)
            loadBoards();
            
            // Show dashboard
            dashboard.style.display = 'flex';
        }
        
        function loadBoards() {
            // Simulate loading boards
            showLoading('Loading your boards...');
            
            setTimeout(() => {
                // Sample boards data
                boards = [
                    { id: 'board1', name: 'Project Brainstorm', lastModified: '2023-06-15', thumbnail: '' },
                    { id: 'board2', name: 'Team Meeting Notes', lastModified: '2023-06-10', thumbnail: '' },
                    { id: 'board3', name: 'UI Design Ideas', lastModified: '2023-06-05', thumbnail: '' },
                    { id: 'board4', name: 'Marketing Strategy', lastModified: '2023-05-28', thumbnail: '' },
                    { id: 'board5', name: 'Product Roadmap', lastModified: '2023-05-20', thumbnail: '' }
                ];
                
                renderBoardList();
                hideLoading();
            }, 800);
        }
        
        function renderBoardList() {
            boardList.innerHTML = '';
            
            // Sort boards by last modified (newest first)
            boards.sort((a, b) => new Date(b.lastModified) - new Date(a.lastModified));
            
            boards.forEach(board => {
                const boardItem = document.createElement('div');
                boardItem.className = 'board-item';
                boardItem.innerHTML = `
                    <div class="board-name">${board.name}</div>
                    <div class="board-date">Last edited: ${board.lastModified}</div>
                `;
                
                boardItem.addEventListener('click', () => {
                    openBoard(board);
                });
                
                boardList.appendChild(boardItem);
            });
        }
        
        function openBoard(board) {
            currentBoard = board;
            boardTitle.textContent = board.name;
            
            // Hide dashboard and show whiteboard
            dashboard.style.display = 'none';
            whiteboardApp.style.display = 'flex';
            
            // Initialize whiteboard
            initWhiteboard();
        }
        
        function createNewBoard() {
            showLoading('Creating new board...');
            
            // Generate a new board ID
            const newBoardId = 'board-' + Date.now();
            const newBoard = {
                id: newBoardId,
                name: 'Untitled Board',
                lastModified: new Date().toISOString().split('T')[0],
                thumbnail: ''
            };
            
            // Add to boards array
            boards.unshift(newBoard);
            
            setTimeout(() => {
                renderBoardList();
                openBoard(newBoard);
                hideLoading();
            }, 500);
        }
        
        function initWhiteboard() {
            // Set canvas size
            resizeCanvas();
            
            // Set initial drawing styles
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            
            // Set up drawing events
            setupDrawingEvents();
        }
        
        function resizeCanvas() {
            const container = whiteboard.parentElement;
            whiteboard.width = container.offsetWidth;
            whiteboard.height = container.offsetHeight;
        }
        
        function setupDrawingEvents() {
            whiteboard.addEventListener('mousedown', startDrawing);
            whiteboard.addEventListener('mousemove', draw);
            whiteboard.addEventListener('mouseup', stopDrawing);
            whiteboard.addEventListener('mouseout', stopDrawing);
        }
        
        function startDrawing(e) {
            isDrawing = true;
            [lastX, lastY] = [e.offsetX, e.offsetY];
        }
        
        function draw(e) {
            if (!isDrawing) return;
            
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
            [lastX, lastY] = [e.offsetX, e.offsetY];
        }
        
        function stopDrawing() {
            isDrawing = false;
        }
        
        function saveBoard() {
            showLoading('Saving board...');
            
            // In a real app, this would save to a database
            setTimeout(() => {
                // Update last modified date
                currentBoard.lastModified = new Date().toISOString().split('T')[0];
                
                // Update board list
                renderBoardList();
                hideLoading();
                
                // Show confirmation
                alert('Board saved successfully!');
            }, 800);
        }
        
        function showLoading(message = 'Loading...') {
            loadingText.textContent = message;
            loadingScreen.style.display = 'flex';
        }
        
        function hideLoading() {
            loadingScreen.style.display = 'none';
        }
        
        function setupEventListeners() {
            // Auth tabs
            loginTab.addEventListener('click', () => {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
            });
            
            registerTab.addEventListener('click', () => {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
            });
            
            // Login form
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                
                // Get form values
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                
                // Simple validation
                if (!email || !password) {
                    alert('Please enter both email and password');
                    return;
                }
                
                // Simulate login
                showLoading('Signing in...');
                
                setTimeout(() => {
                    currentUser = {
                        id: 'user-' + Math.random().toString(36).substr(2, 9),
                        name: email.split('@')[0],
                        email: email
                    };
                    
                    // Save to localStorage
                    localStorage.setItem('whiteboard_user', JSON.stringify(currentUser));
                    
                    hideLoading();
                    hideAuth();
                    loadDashboard();
                }, 1000);
            });
            
            // Social auth buttons
            document.querySelectorAll('.social-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const provider = e.currentTarget.id.replace('Auth', '');
                    socialLogin(provider);
                });
            });
            
            // New board buttons
            newBoardBtn.addEventListener('click', createNewBoard);
            quickStartBtn.addEventListener('click', createNewBoard);
            
            // Whiteboard buttons
            backToDashboard.addEventListener('click', () => {
                whiteboardApp.style.display = 'none';
                dashboard.style.display = 'flex';
            });
            
            saveBoardBtn.addEventListener('click', saveBoard);
            
            // Window resize
            window.addEventListener('resize', () => {
                if (whiteboardApp.style.display === 'flex') {
                    resizeCanvas();
                }
            });
        }
        
        function socialLogin(provider) {
            showLoading(`Signing in with ${provider}...`);
            
            // Simulate social login
            setTimeout(() => {
                currentUser = {
                    id: 'user-' + Math.random().toString(36).substr(2, 9),
                    name: provider.charAt(0).toUpperCase() + provider.slice(1) + ' User',
                    email: `${provider.toLowerCase()}@example.com`
                };
                
                // Save to localStorage
                localStorage.setItem('whiteboard_user', JSON.stringify(currentUser));
                
                hideLoading();
                hideAuth();
                loadDashboard();
            }, 1200);
        }
        
        // Initialize the app
        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
