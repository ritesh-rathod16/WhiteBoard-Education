<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collaborative Whiteboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    /* Base Styles */
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5f5f5;
    }

    .hidden {
      display: none !important;
    }

    /* Auth Page */
    .split-screen {
      display: flex;
      height: 100vh;
    }

    .left-panel {
      flex: 1;
      background: linear-gradient(135deg, #6e8efb, #a777e3);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .logo {
      font-size: 3rem;
      font-weight: bold;
    }

    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      background-color: white;
    }

    .auth-tabs {
      display: flex;
      margin-bottom: 2rem;
    }

    .tab-btn {
      padding: 0.75rem 2rem;
      border: none;
      background: none;
      font-size: 1rem;
      cursor: pointer;
      position: relative;
    }

    .tab-btn.active {
      font-weight: bold;
    }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 100%;
      height: 3px;
      background-color: #6e8efb;
    }

    .auth-form {
      width: 100%;
      max-width: 400px;
      display: none;
      flex-direction: column;
    }

    .auth-form.active {
      display: flex;
    }

    .auth-form input {
      margin-bottom: 1rem;
      padding: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 1rem;
    }

    .auth-form input:focus {
      outline: none;
      border-color: #6e8efb;
    }

    .btn-primary {
      padding: 0.75rem;
      background-color: #6e8efb;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 1rem;
    }

    .btn-primary:hover {
      background-color: #5a7df4;
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }

    .social-login {
      margin-top: 2rem;
      width: 100%;
    }

    .social-btn {
      width: 100%;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .social-btn.google {
      background-color: #fff;
      color: #757575;
    }

    .social-btn.github {
      background-color: #333;
      color: white;
    }

    /* App Container */
    #app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .toolbar {
      padding: 0.5rem 1rem;
      background-color: #2c3e50;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .tool-btn, .action-btn {
      background: none;
      border: none;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0.5rem;
      border-radius: 4px;
    }

    .tool-btn:hover, .action-btn:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    .tool-btn.active {
      background-color: rgba(255, 255, 255, 0.2);
    }

    .action-btn.danger {
      color: #e74c3c;
    }

    .user-info {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 1rem;
      color: white;
    }

    .btn-secondary {
      background: none;
      border: 1px solid white;
      color: white;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      cursor: pointer;
    }

    .btn-secondary:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    .main-content {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .users-panel {
      width: 200px;
      background-color: #34495e;
      color: white;
      padding: 1rem;
      overflow-y: auto;
    }

    .users-panel h3 {
      margin-top: 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 0.5rem;
    }

    .user-item {
      display: flex;
      align-items: center;
      padding: 0.5rem 0;
    }

    .user-color {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 0.5rem;
    }

    .canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #whiteboard {
      background-color: white;
      display: block;
      width: 100%;
      height: 100%;
    }

    #cursors-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .remote-cursor {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .cursor-name {
      position: absolute;
      top: 15px;
      left: 0;
      background-color: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 2px 5px;
      border-radius: 3px;
      font-size: 0.8rem;
      white-space: nowrap;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .split-screen {
        flex-direction: column;
      }
      
      .left-panel {
        padding: 2rem;
      }
      
      .main-content {
        flex-direction: column;
      }
      
      .users-panel {
        width: 100%;
        max-height: 150px;
      }
    }
  </style>
</head>
<body>
  <div id="auth-container" class="split-screen">
    <div class="left-panel">
      <div class="logo">Whiteboard</div>
    </div>
    <div class="right-panel">
      <div class="auth-tabs">
        <button class="tab-btn active" data-tab="login">Login</button>
        <button class="tab-btn" data-tab="register">Register</button>
      </div>
      <div id="login-form" class="auth-form active">
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-password" placeholder="Password">
        <div class="form-options">
          <label><input type="checkbox" id="remember-me"> Remember me</label>
          <a href="#" id="forgot-password">Forgot password?</a>
        </div>
        <button id="login-btn" class="btn-primary">Login</button>
        <div class="social-login">
          <button class="social-btn google"><i class="fab fa-google"></i> Continue with Google</button>
          <button class="social-btn github"><i class="fab fa-github"></i> Continue with GitHub</button>
        </div>
      </div>
      <div id="register-form" class="auth-form">
        <input type="text" id="register-name" placeholder="Name">
        <input type="email" id="register-email" placeholder="Email">
        <input type="password" id="register-password" placeholder="Password">
        <input type="password" id="register-confirm" placeholder="Confirm Password">
        <button id="register-btn" class="btn-primary">Register</button>
      </div>
    </div>
  </div>

  <div id="app-container" class="hidden">
    <div class="toolbar">
      <button id="pen-tool" class="tool-btn active" title="Pen">
        <i class="fas fa-pen"></i>
      </button>
      <button id="line-tool" class="tool-btn" title="Line">
        <i class="fas fa-slash"></i>
      </button>
      <button id="rect-tool" class="tool-btn" title="Rectangle">
        <i class="fas fa-square"></i>
      </button>
      <button id="circle-tool" class="tool-btn" title="Circle">
        <i class="fas fa-circle"></i>
      </button>
      <button id="eraser-tool" class="tool-btn" title="Eraser">
        <i class="fas fa-eraser"></i>
      </button>
      <input type="color" id="color-picker" value="#000000">
      <input type="range" id="stroke-width" min="1" max="20" value="3">
      <button id="undo-btn" class="action-btn" title="Undo">
        <i class="fas fa-undo"></i>
      </button>
      <button id="redo-btn" class="action-btn" title="Redo">
        <i class="fas fa-redo"></i>
      </button>
      <button id="clear-btn" class="action-btn danger" title="Clear">
        <i class="fas fa-trash"></i>
      </button>
      <div class="user-info">
        <span id="username-display"></span>
        <button id="logout-btn" class="btn-secondary">Logout</button>
      </div>
    </div>
    
    <div class="main-content">
      <div class="users-panel">
        <h3>Online Users</h3>
        <div id="users-list"></div>
      </div>
      <div class="canvas-container">
        <canvas id="whiteboard"></canvas>
        <div id="cursors-layer"></div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
  
  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      databaseURL: "YOUR_DATABASE_URL",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();
    const googleProvider = new firebase.auth.GoogleAuthProvider();
    const githubProvider = new firebase.auth.GithubAuthProvider();

    // Auth Manager
    class AuthManager {
      constructor() {
        this.user = null;
        this.initAuthListeners();
        this.bindAuthEvents();
      }

      initAuthListeners() {
        auth.onAuthStateChanged(user => {
          this.user = user;
          if (user) {
            this.handleUserLogin(user);
          } else {
            this.handleUserLogout();
          }
        });
      }

      bindAuthEvents() {
        // Login form
        document.getElementById('login-btn').addEventListener('click', () => {
          const email = document.getElementById('login-email').value;
          const password = document.getElementById('login-password').value;
          this.loginWithEmail(email, password);
        });

        // Register form
        document.getElementById('register-btn').addEventListener('click', () => {
          const name = document.getElementById('register-name').value;
          const email = document.getElementById('register-email').value;
          const password = document.getElementById('register-password').value;
          const confirm = document.getElementById('register-confirm').value;
          
          if (password === confirm) {
            this.registerWithEmail(name, email, password);
          } else {
            alert("Passwords don't match!");
          }
        });

        // Social logins
        document.querySelector('.google').addEventListener('click', () => this.loginWithGoogle());
        document.querySelector('.github').addEventListener('click', () => this.loginWithGitHub());
        
        // Logout
        document.getElementById('logout-btn').addEventListener('click', () => this.logout());
        
        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const tab = btn.getAttribute('data-tab');
            this.switchTab(tab);
          });
        });
      }

      async loginWithEmail(email, password) {
        try {
          await auth.signInWithEmailAndPassword(email, password);
        } catch (error) {
          alert(error.message);
        }
      }

      async registerWithEmail(name, email, password) {
        try {
          const { user } = await auth.createUserWithEmailAndPassword(email, password);
          await user.updateProfile({ displayName: name });
        } catch (error) {
          alert(error.message);
        }
      }

      async loginWithGoogle() {
        try {
          await auth.signInWithPopup(googleProvider);
        } catch (error) {
          alert(error.message);
        }
      }

      async loginWithGitHub() {
        try {
          await auth.signInWithPopup(githubProvider);
        } catch (error) {
          alert(error.message);
        }
      }

      async logout() {
        try {
          await auth.signOut();
        } catch (error) {
          alert(error.message);
        }
      }

      handleUserLogin(user) {
        document.getElementById('auth-container').classList.add('hidden');
        document.getElementById('app-container').classList.remove('hidden');
        document.getElementById('username-display').textContent = user.displayName || user.email;
        
        // Initialize the whiteboard
        const whiteboard = new Whiteboard(user.uid, user.displayName || "Anonymous");
        whiteboard.init();
      }

      handleUserLogout() {
        document.getElementById('auth-container').classList.remove('hidden');
        document.getElementById('app-container').classList.add('hidden');
      }

      switchTab(tab) {
        document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(`${tab}-form`).classList.add('active');
        document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      }
    }

    // Whiteboard Class
    class Whiteboard {
      constructor(userId, userName, sessionId = 'default') {
        this.userId = userId;
        this.userName = userName;
        this.sessionId = sessionId;
        this.canvas = document.getElementById('whiteboard');
        this.ctx = this.canvas.getContext('2d');
        this.cursorsLayer = document.getElementById('cursors-layer');
        this.currentTool = 'pen';
        this.currentColor = '#000000';
        this.currentWidth = 3;
        this.isDrawing = false;
        this.lastX = 0;
        this.lastY = 0;
        this.startX = 0;
        this.startY = 0;
        this.drawingHistory = [];
        this.historyIndex = -1;
        this.tempCanvas = null;
        
        this.resizeCanvas();
        window.addEventListener('resize', () => this.resizeCanvas());
      }

      resizeCanvas() {
        this.canvas.width = this.canvas.offsetWidth;
        this.canvas.height = this.canvas.offsetHeight;
        this.redrawCanvas();
      }

      init() {
        this.bindToolEvents();
        this.bindCanvasEvents();
        this.setupFirebaseListeners();
        this.setupUserPresence();
      }

      bindToolEvents() {
        // Tool selection
        document.getElementById('pen-tool').addEventListener('click', () => this.setTool('pen'));
        document.getElementById('line-tool').addEventListener('click', () => this.setTool('line'));
        document.getElementById('rect-tool').addEventListener('click', () => this.setTool('rect'));
        document.getElementById('circle-tool').addEventListener('click', () => this.setTool('circle'));
        document.getElementById('eraser-tool').addEventListener('click', () => this.setTool('eraser'));
        
        // Color and width
        document.getElementById('color-picker').addEventListener('change', (e) => {
          this.currentColor = e.target.value;
        });
        
        document.getElementById('stroke-width').addEventListener('input', (e) => {
          this.currentWidth = parseInt(e.target.value);
        });
        
        // Actions
        document.getElementById('undo-btn').addEventListener('click', () => this.undo());
        document.getElementById('redo-btn').addEventListener('click', () => this.redo());
        document.getElementById('clear-btn').addEventListener('click', () => this.clearCanvas());
      }

      setTool(tool) {
        this.currentTool = tool;
        document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`${tool}-tool`).classList.add('active');
      }

      bindCanvasEvents() {
        this.canvas.addEventListener('mousedown', (e) => this.startDrawing(e));
        this.canvas.addEventListener('mousemove', (e) => this.draw(e));
        this.canvas.addEventListener('mouseup', () => this.stopDrawing());
        this.canvas.addEventListener('mouseout', () => this.stopDrawing());
        
        // Touch support
        this.canvas.addEventListener('touchstart', (e) => this.handleTouch(e, this.startDrawing));
        this.canvas.addEventListener('touchmove', (e) => this.handleTouch(e, this.draw));
        this.canvas.addEventListener('touchend', () => this.stopDrawing());
      }

      handleTouch(e, handler) {
        e.preventDefault();
        const touch = e.touches[0];
        const mouseEvent = new MouseEvent(
          e.type === 'touchstart' ? 'mousedown' : 'mousemove',
          {
            clientX: touch.clientX,
            clientY: touch.clientY
          }
        );
        handler.call(this, mouseEvent);
      }

      startDrawing(e) {
        this.isDrawing = true;
        const rect = this.canvas.getBoundingClientRect();
        this.lastX = e.clientX - rect.left;
        this.lastY = e.clientY - rect.top;
        
        // For shape tools, store the starting point
        if (['line', 'rect', 'circle'].includes(this.currentTool)) {
          this.startX = this.lastX;
          this.startY = this.lastY;
        }
        
        // For freehand/pen, start a new path
        if (this.currentTool === 'pen' || this.currentTool === 'eraser') {
          this.ctx.beginPath();
          this.ctx.moveTo(this.lastX, this.lastY);
        }
      }

      draw(e) {
        if (!this.isDrawing) return;
        
        const rect = this.canvas.getBoundingClientRect();
        const currentX = e.clientX - rect.left;
        const currentY = e.clientY - rect.top;
        
        // Update cursor position for other users
        this.updateCursorPosition(currentX, currentY);
        
        // Clear any temporary drawing
        if (this.tempCanvas) {
          this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
          this.redrawCanvas();
        }
        
        switch (this.currentTool) {
          case 'pen':
            this.drawFreehand(currentX, currentY);
            break;
          case 'line':
            this.drawTempLine(currentX, currentY);
            break;
          case 'rect':
            this.drawTempRect(currentX, currentY);
            break;
          case 'circle':
            this.drawTempCircle(currentX, currentY);
            break;
          case 'eraser':
            this.erase(currentX, currentY);
            break;
        }
        
        this.lastX = currentX;
        this.lastY = currentY;
      }

      stopDrawing() {
        if (!this.isDrawing) return;
        this.isDrawing = false;
        
        // If we have a temporary drawing, finalize it
        if (this.tempCanvas) {
          this.finalizeDrawing();
          this.tempCanvas = null;
        }
        
        // Record the drawing action for undo/redo
        if (this.currentTool !== 'eraser') {
          this.recordDrawingAction();
        }
      }

      drawFreehand(x, y) {
        this.ctx.lineTo(x, y);
        this.ctx.strokeStyle = this.currentTool === 'eraser' ? '#ffffff' : this.currentColor;
        this.ctx.lineWidth = this.currentWidth;
        this.ctx.lineCap = 'round';
        this.ctx.lineJoin = 'round';
        this.ctx.stroke();
        
        // Broadcast drawing to other users
        this.broadcastDrawing({
          type: 'path',
          points: [{x: this.lastX, y: this.lastY}, {x, y}],
          color: this.currentColor,
          width: this.currentWidth
        });
      }

      drawTempLine(x, y) {
        this.tempCanvas = document.createElement('canvas');
        this.tempCanvas.width = this.canvas.width;
        this.tempCanvas.height = this.canvas.height;
        const tempCtx = this.tempCanvas.getContext('2d');
        
        tempCtx.beginPath();
        tempCtx.moveTo(this.startX, this.startY);
        tempCtx.lineTo(x, y);
        tempCtx.strokeStyle = this.currentColor;
        tempCtx.lineWidth = this.currentWidth;
        tempCtx.stroke();
        
        this.ctx.drawImage(this.tempCanvas, 0, 0);
      }

      finalizeDrawing() {
        if (!this.tempCanvas) return;
        
        const tempCtx = this.tempCanvas.getContext('2d');
        const imageData = tempCtx.getImageData(0, 0, this.tempCanvas.width, this.tempCanvas.height);
        this.ctx.putImageData(imageData, 0, 0);
        
        // Broadcast the final drawing
        if (this.currentTool === 'line') {
          this.broadcastDrawing({
            type: 'line',
            start: {x: this.startX, y: this.startY},
            end: {x: this.lastX, y: this.lastY},
            color: this.currentColor,
            width: this.currentWidth
          });
        }
        // Similar for rect and circle
      }

      erase(x, y) {
        this.ctx.globalCompositeOperation = 'destination-out';
        this.ctx.beginPath();
        this.ctx.arc(x, y, this.currentWidth, 0, Math.PI * 2);
        this.ctx.fill();
        this.ctx.globalCompositeOperation = 'source-over';
        
        // Broadcast erase action
        this.broadcastErase(x, y, this.currentWidth);
      }

      broadcastDrawing(data) {
        const drawingRef = database.ref(`drawings/${this.sessionId}`);
        drawingRef.push({
          ...data,
          userId: this.userId,
          timestamp: firebase.database.ServerValue.TIMESTAMP
        });
      }

      broadcastErase(x, y, radius) {
        const eraseRef = database.ref(`erases/${this.sessionId}`);
        eraseRef.push({
          x,
          y,
          radius,
          userId: this.userId,
          timestamp: firebase.database.ServerValue.TIMESTAMP
        });
      }

      updateCursorPosition(x, y) {
        const cursorRef = database.ref(`cursors/${this.sessionId}/${this.userId}`);
        cursorRef.set({
          x,
          y,
          name: this.userName,
          color: this.getUserColor(),
          lastUpdated: firebase.database.ServerValue.TIMESTAMP
        });
      }

      setupFirebaseListeners() {
        // Listen for drawings
        database.ref(`drawings/${this.sessionId}`).on('child_added', (snapshot) => {
          const drawing = snapshot.val();
          if (drawing.userId !== this.userId) {
            this.renderRemoteDrawing(drawing);
          }
        });
        
        // Listen for erases
        database.ref(`erases/${this.sessionId}`).on('child_added', (snapshot) => {
          const erase = snapshot.val();
          if (erase.userId !== this.userId) {
            this.renderRemoteErase(erase);
          }
        });
        
        // Listen for cursor movements
        database.ref(`cursors/${this.sessionId}`).on('child_changed', (snapshot) => {
          const cursor = snapshot.val();
          if (cursor.userId !== this.userId) {
            this.updateRemoteCursor(snapshot.key, cursor);
          }
        });
        
        // Listen for user presence
        database.ref(`presence/${this.sessionId}`).on('value', (snapshot) => {
          this.updateUserList(snapshot.val());
        });
      }

      renderRemoteDrawing(drawing) {
        switch (drawing.type) {
          case 'path':
            this.ctx.beginPath();
            this.ctx.moveTo(drawing.points[0].x, drawing.points[0].y);
            this.ctx.lineTo(drawing.points[1].x, drawing.points[1].y);
            this.ctx.strokeStyle = drawing.color;
            this.ctx.lineWidth = drawing.width;
            this.ctx.stroke();
            break;
          case 'line':
            this.ctx.beginPath();
            this.ctx.moveTo(drawing.start.x, drawing.start.y);
            this.ctx.lineTo(drawing.end.x, drawing.end.y);
            this.ctx.strokeStyle = drawing.color;
            this.ctx.lineWidth = drawing.width;
            this.ctx.stroke();
            break;
          // Add cases for other drawing types
        }
      }

      renderRemoteErase(erase) {
        this.ctx.globalCompositeOperation = 'destination-out';
        this.ctx.beginPath();
        this.ctx.arc(erase.x, erase.y, erase.radius, 0, Math.PI * 2);
        this.ctx.fill();
        this.ctx.globalCompositeOperation = 'source-over';
      }

      updateRemoteCursor(userId, cursor) {
        let cursorElement = document.getElementById(`cursor-${userId}`);
        
        if (!cursorElement) {
          cursorElement = document.createElement('div');
          cursorElement.id = `cursor-${userId}`;
          cursorElement.className = 'remote-cursor';
          cursorElement.style.backgroundColor = cursor.color;
          
          const nameTag = document.createElement('div');
          nameTag.className = 'cursor-name';
          nameTag.textContent = cursor.name;
          cursorElement.appendChild(nameTag);
          
          this.cursorsLayer.appendChild(cursorElement);
        }
        
        const rect = this.canvas.getBoundingClientRect();
        cursorElement.style.left = `${cursor.x + rect.left}px`;
        cursorElement.style.top = `${cursor.y + rect.top}px`;
      }

      setupUserPresence() {
        const presenceRef = database.ref(`presence/${this.sessionId}/${this.userId}`);
        
        // Set user as online
        presenceRef.set({
          name: this.userName,
          color: this.getUserColor(),
          lastOnline: firebase.database.ServerValue.TIMESTAMP
        });
        
        // Remove user when they disconnect
        presenceRef.onDisconnect().remove();
      }

      updateUserList(users) {
        const usersList = document.getElementById('users-list');
        usersList.innerHTML = '';
        
        if (!users) return;
        
        Object.entries(users).forEach(([userId, userData]) => {
          if (userId === this.userId) return;
          
          const userElement = document.createElement('div');
          userElement.className = 'user-item';
          userElement.innerHTML = `
            <span class="user-color" style="background-color: ${userData.color}"></span>
            <span class="user-name">${userData.name}</span>
          `;
          usersList.appendChild(userElement);
        });
      }

      getUserColor() {
        const hash = Array.from(this.userId).reduce((hash, char) => {
          return char.charCodeAt(0) + ((hash << 5) - hash);
        }, 0);
        return `hsl(${Math.abs(hash % 360)}, 70%, 60%)`;
      }

      undo() {
        if (this.historyIndex >= 0) {
          const action = this.drawingHistory[this.historyIndex];
          this.reverseAction(action);
          this.historyIndex--;
          
          // Broadcast undo
          database.ref(`actions/${this.sessionId}`).push({
            type: 'undo',
            actionId: action.id,
            userId: this.userId
          });
        }
      }

      redo() {
        if (this.historyIndex < this.drawingHistory.length - 1) {
          this.historyIndex++;
          const action = this.drawingHistory[this.historyIndex];
          this.applyAction(action);
          
          // Broadcast redo
          database.ref(`actions/${this.sessionId}`).push({
            type: 'redo',
            actionId: action.id,
            userId: this.userId
          });
        }
      }

      clearCanvas() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        
        // Broadcast clear
        database.ref(`actions/${this.sessionId}`).push({
          type: 'clear',
          userId: this.userId
        });
      }

      redrawCanvas() {
        // Redraw all drawings from history up to current index
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        
        for (let i = 0; i <= this.historyIndex; i++) {
          this.applyAction(this.drawingHistory[i]);
        }
      }

      recordDrawingAction() {
        // Capture current canvas state
        const imageData = this.ctx.getImageData(0, 0, this.canvas.width, this.canvas.height);
        
        // Add to history
        this.drawingHistory.splice(this.historyIndex + 1);
        this.drawingHistory.push({
          id: Date.now(),
          imageData
        });
        this.historyIndex = this.drawingHistory.length - 1;
      }

      applyAction(action) {
        this.ctx.putImageData(action.imageData, 0, 0);
      }

      reverseAction(action) {
        // For undo, we revert to the previous state
        if (this.historyIndex > 0) {
          const prevAction = this.drawingHistory[this.historyIndex - 1];
          this.ctx.putImageData(prevAction.imageData, 0, 0);
        } else {
          this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        }
      }

      cleanup() {
        // Clean up Firebase listeners
        database.ref(`drawings/${this.sessionId}`).off();
        database.ref(`erases/${this.sessionId}`).off();
        database.ref(`cursors/${this.sessionId}`).off();
        database.ref(`presence/${this.sessionId}`).off();
      }
    }

    // Initialize the app when DOM is loaded
    document.addEventListener('DOMContentLoaded', () => {
      new AuthManager();
    });
  </script>
</body>
</html>
